<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Split Bill — Debug Tool</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem auto; max-width: 820px; color: #1a1a1a; padding: 0 1rem; }
    h1 { font-size: 1.3rem; } h2 { font-size: 1.05rem; margin-top: 1.6rem; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin: 1rem 0; }
    .flag { padding: .2rem .5rem; border-radius: 4px; font-size: .8rem; font-weight: 600; margin-right: .4rem; }
    .ok { background: #e3f6e3; color: #1a7f1a; } .bad { background: #fbe3e3; color: #a11; }
    table { border-collapse: collapse; width: 100%; margin-top: .5rem; }
    th, td { border: 1px solid #eee; padding: .35rem .5rem; text-align: left; font-size: .9rem; }
    .low { background: #fff3cd; } .num { text-align: right; font-variant-numeric: tabular-nums; }
    pre { background: #f6f6f6; padding: .75rem; overflow: auto; font-size: .8rem; }
    button { padding: .45rem 1rem; font-size: .95rem; cursor: pointer; border-radius: 6px; border: 1px solid #bbb; background: #fafafa; }
    button.primary { background: #1a7f1a; color: #fff; border-color: #1a7f1a; }
    input[type=text], input[type=number] { padding: .3rem; font-size: .9rem; border: 1px solid #ccc; border-radius: 4px; }
    input.name { width: 90%; } input.price { width: 90px; text-align: right; }
    .person-chip { display: inline-flex; align-items: center; gap: .3rem; margin: .2rem; padding: .2rem .5rem; background: #eef; border-radius: 6px; }
    .muted { color: #888; font-size: .85rem; }
    .pay { font-size: 1.05rem; font-weight: 600; }
  </style>
</head>
<body>
  <h1>Split Bill — Debug &amp; Split Tool</h1>

  <div class="card">
    <h2>1. Scan a receipt</h2>
    <input type="file" id="file" accept="image/*" />
    <button id="go">Scan</button>
    <div id="status" class="muted"></div>
    <div id="scanOut"></div>
  </div>

  <div class="card" id="splitCard" style="display:none">
    <h2>2. People</h2>
    <div id="people"></div>
    <button id="addPerson">+ Add person</button>

    <h2>3. Who ate what</h2>
    <p class="muted">Tick everyone who shared an item. You can fix any wrong name or price before splitting.</p>
    <div id="assign"></div>

    <p style="margin-top:1rem"><button class="primary" id="computeSplit">Compute Split →</button></p>
    <div id="splitOut"></div>
  </div>

<script>
const CONF_LOW = 0.70;
const rp = (n) => "Rp " + (Number(n) || 0).toLocaleString("id-ID");
let receipt = null;                 // last scanned receipt
let people = [{id:"p0",name:"A"}, {id:"p1",name:"B"}, {id:"p2",name:"C"}];
let pid = 3;

// ---------- 1. SCAN ----------
document.getElementById("go").onclick = async () => {
  const f = document.getElementById("file").files[0];
  const status = document.getElementById("status");
  const out = document.getElementById("scanOut");
  out.innerHTML = "";
  if (!f) { status.textContent = "Pick an image first."; return; }
  status.textContent = "Scanning… (first scan can take a few seconds)";
  const fd = new FormData(); fd.append("file", f);
  let res;
  try { res = await (await fetch("/receipts/scan", {method:"POST", body:fd})).json(); }
  catch (e) { status.textContent = "Request failed: " + e; return; }
  status.textContent = "";

  if (res.needs_rescan) {
    out.innerHTML = `<div><span class="flag bad">NEEDS RE-SCAN</span>${res.reason||"Image quality too low."}</div>`;
    document.getElementById("splitCard").style.display = "none";
    return;
  }
  receipt = res.receipt;
  const recFlag = receipt.reconciled ? `<span class="flag ok">RECONCILED</span>`
                                     : `<span class="flag bad">NOT RECONCILED</span>`;
  const review = receipt.needs_review.length ? `<span class="flag bad">REVIEW: ${receipt.needs_review.join(", ")}</span>` : "";
  const charges = (receipt.charges||[]).map(c => `${c.label} (${c.kind}): ${rp(c.value)}`).join(" · ") || "none";
  out.innerHTML = `<div>${recFlag}${review}</div>
    <p class="muted">Charges: ${charges} &nbsp;|&nbsp; subtotal ${rp(receipt.subtotal)} · total ${rp(receipt.total)}</p>
    <details><summary>Raw JSON</summary><pre>${JSON.stringify(res,null,2)}</pre></details>`;

  document.getElementById("splitCard").style.display = "block";
  renderPeople(); renderAssign();
};

// ---------- 2. PEOPLE ----------
function renderPeople() {
  const el = document.getElementById("people");
  el.innerHTML = people.map((p,i) => `
    <span class="person-chip">
      <input type="text" value="${p.name}" data-i="${i}" class="pname" style="width:90px" />
      ${people.length > 1 ? `<button data-rm="${i}" title="remove">✕</button>` : ""}
    </span>`).join("");
  el.querySelectorAll(".pname").forEach(inp => inp.oninput = e => {
    people[+e.target.dataset.i].name = e.target.value; renderAssign();
  });
  el.querySelectorAll("[data-rm]").forEach(b => b.onclick = e => {
    people.splice(+e.target.dataset.rm, 1); renderPeople(); renderAssign();
  });
}
document.getElementById("addPerson").onclick = () => {
  people.push({id:"p"+(pid++), name:"P"+people.length}); renderPeople(); renderAssign();
};

// ---------- 3. ASSIGNMENT TABLE ----------
function renderAssign() {
  if (!receipt) return;
  const el = document.getElementById("assign");
  const head = `<tr><th>Item</th><th class="num">Price</th>${people.map(p=>`<th>${p.name||"?"}</th>`).join("")}</tr>`;
  const rows = receipt.line_items.map((it,idx) => {
    const low = it.confidence < CONF_LOW ? "low" : "";
    const checks = people.map(p =>
      `<td style="text-align:center"><input type="checkbox" data-item="${idx}" data-pid="${p.id}"></td>`).join("");
    return `<tr class="${low}">
      <td><input type="text" class="name" data-name="${idx}" value="${(it.name||"").replace(/"/g,'&quot;')}"></td>
      <td class="num"><input type="number" class="price" data-price="${idx}" value="${it.line_total}"></td>
      ${checks}</tr>`;
  }).join("");
  el.innerHTML = `<table>${head}${rows}</table>`;
  el.querySelectorAll(".name").forEach(i => i.oninput = e => receipt.line_items[+e.target.dataset.name].name = e.target.value);
  el.querySelectorAll(".price").forEach(i => i.oninput = e => {
    const v = parseInt(e.target.value||"0",10);
    const it = receipt.line_items[+e.target.dataset.price]; it.line_total = v; it.unit_price = v;
  });
}

// ---------- COMPUTE SPLIT ----------
document.getElementById("computeSplit").onclick = async () => {
  const out = document.getElementById("splitOut");
  out.innerHTML = "Working…";

  // assignments from checkboxes
  const map = {};
  document.querySelectorAll("#assign input[type=checkbox]:checked").forEach(c => {
    const idx = +c.dataset.item; (map[idx] = map[idx] || []).push(c.dataset.pid);
  });
  const assignments = Object.entries(map).map(([i, ids]) => ({line_item_index:+i, person_ids:ids}));
  if (!assignments.length) { out.innerHTML = `<span class="flag bad">Assign at least one item to someone.</span>`; return; }

  try {
    const create = await (await fetch("/bills", {method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({receipt, people})})).json();
    const code = create.code;
    await fetch(`/bills/${code}/assignments`, {method:"PUT", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({assignments})});
    const split = await (await fetch(`/bills/${code}/split`)).json();

    const rows = split.per_person.map(p => `<tr>
        <td>${p.name}</td>
        <td class="num">${rp(p.items_subtotal)}</td>
        <td class="num">${rp(p.tax_share + p.service_share + p.other_share)}</td>
        <td class="num pay">${rp(p.total_owed)}</td></tr>`).join("");
    out.innerHTML = `
      <p class="muted">Bill code: <strong>${code}</strong> — shareable; others can GET /bills/${code}/split</p>
      <table>
        <tr><th>Person</th><th class="num">Food</th><th class="num">+ Tax/Service/Round</th><th class="num">Pays</th></tr>
        ${rows}
        <tr><th>Total collected</th><td></td><td></td><td class="num pay">${rp(split.grand_total)}</td></tr>
      </table>
      <p class="muted">Total collected should equal the receipt total (${rp(receipt.total)}).</p>`;
  } catch (e) { out.innerHTML = `<span class="flag bad">Split failed: ${e}</span>`; }
};
</script>
</body>
</html>
